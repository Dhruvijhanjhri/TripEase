{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row">

        <div class="col-md-6">

            <img
                src="{{ package.image_url }}"
                class="img-fluid rounded"
            >

        </div>

        <div class="col-md-6">

            <h2>{{ package.name }}</h2>

            <p>
                {{ package.destination }},
                {{ package.state }}
            </p>

            <p>
                ₹{{ package.price }}
                per person
            </p>

            <hr>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label>
                        Travel Date
                    </label>

                    {{ form.travel_date }}

                </div>

                <div class="mb-3">

                    <label>
                        Number of Travellers
                    </label>

                    {{ form.travellers_count }}

                </div>

                <button
                    type="submit"
                    class="btn btn-success"
                >
                    Confirm Booking
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
